# fly.toml app configuration file generated for warships on 2026-04-11T14:18:06-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'warships'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  # Kodiak binds to port 80 (not 8080) when the server process has
  # CAP_NET_BIND_SERVICE — which it always does in our Fly runtime
  # container because the CMD runs as root. Locally we were non-root
  # so kodiak fell back to 8080. Match the actual bind address here
  # so Fly's edge can find the backend.
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
