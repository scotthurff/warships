<!DOCTYPE html>
<html lang="en" translate="no">
<head>

    <meta charset="utf-8">
    <style>
        @font-face {
            font-family: 'Black Ops One';
            src: url('/data/black-ops-one.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        /* Override Arial/Helvetica globally — kodiak WebGL text uses "30px Arial"
           via canvas 2D ctx.font. This @font-face aliases Arial to our monospace. */
        @font-face {
            font-family: 'Arial';
            src: local('Menlo'), local('SF Mono'), local('Courier New');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Arial';
            src: local('Menlo'), local('SF Mono'), local('Courier New');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Arial';
            src: local('Menlo'), local('SF Mono'), local('Courier New');
            font-weight: 400;
            font-style: italic;
        }
        /* Global body font override */
        body, * {
            font-family: 'Menlo', 'SF Mono', 'Courier New', monospace !important;
        }
        /* Preserve Black Ops One for the logo */
        h1 {
            font-family: 'Black Ops One', 'Menlo', monospace !important;
        }

        /* ── iPad touch fixes ─────────────────────────────────────────
           Kodiak's app.rs sets `touch-action: none` on <body>, which
           on iOS Safari suppresses synthesized click events from taps
           on plain <div> elements (including the Curtain backdrop that
           wraps every NexusDialog — so the Settings menu traps the
           user: backdrop dismiss never fires).

           `touch-action: manipulation` preserves the no-zoom / no-
           delay behavior we actually want but lets taps synthesize
           clicks normally. iOS-specific `!important` beats stylist-
           yew's global_style cascade. */
        body {
            touch-action: manipulation !important;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
        }

        /* Every tap on <button> in iOS Safari flashes a translucent
           light gray overlay on the hit target — over our dark
           wargame panels it reads as a white/washed-out flash. Show
           no highlight; the :active filter in button styles is a
           sufficient visual ack. */
        button, a, [role="button"], input[type="button"], input[type="submit"] {
            -webkit-tap-highlight-color: transparent !important;
        }
    </style>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <script>
        // Prevent pinch-zoom on iPad Safari. Double-tap-zoom is
        // suppressed at the CSS layer via `touch-action: manipulation`
        // (see <style> above) instead of calling preventDefault() on
        // the second touchend — the JS approach also swallows the
        // synthesized click event, which broke rapid-fire button taps.
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });
    </script>
    <title>WARSHIPS</title>
    <meta name="description" content="WARSHIPS — Naval combat game. Command warships, fire torpedoes, and sink the enemy fleet.">
    <meta name="keywords" content="game, warship, naval, combat, battleship">
    <meta name="theme-color" content="#00487d">
    <link data-trunk rel="icon" type="image/png" href="/data/favicon.png">
    <link rel="manifest" href="/data/manifest.json">
    <script>
        function request_pointer_lock_with_unadjusted_movement(e) {
            const promise = e.requestPointerLock({unadjustedMovement: true});
            if (promise) {
                promise.catch(er => {
                    if (er.name === "NotSupportedError") {
                        e.requestPointerLock();
                    }
                });
            }
        }
    </script>
    <link data-trunk rel="rust" data-wasm-opt="z" data-no-demangle/>
    <link data-trunk rel="copy-dir" href="data/">
    

    <script>
        try {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (const registration of registrations) {
                    registration.unregister();
                }
            });
        } catch (e) {
            console.log(e);
        }

        function startLoadInterval() {
            let time = 0;
            let warning = document.getElementById("load_warning");
            let warningText = document.getElementById("load_warning_text");
            const interval = setInterval(() => {
                if (document.getElementById("canvas")) {
                    // Loaded.
                    clearInterval(interval);
                    if (warning && warning.style) {
                        warning.style.display = "none";
                    }
                    return;
                }

                if (time > 5) {
                    warning.style.display = "initial";
                    warningText.innerText = `Loading taking longer than expected (${Math.floor(time)}s)`;
                }
                time += 0.5;
            }, 500);
        }
    </script>
</head>
<body style="background-color: #00487d;" onload="startLoadInterval()">
    <div id="load_warning" style="display: none; font-family: 'Menlo', 'SF Mono', 'Courier New', monospace; padding: 1rem; color: white; position: absolute; left: 50%; text-align: center; top: 50%; transform: translate(-50%, -50%);">
        <h2 style="margin-top: 0;" id="load_warning_text"></h2>
        <button onclick="window.location.reload()" style="width: 10rem; height: 3rem; border-radius: 0.5rem; background-color: #505050; border: 2px solid #606060; color: white; font-size: 1.2rem; cursor: pointer;">Click to retry</button>
    </div>
</body>
</html>
